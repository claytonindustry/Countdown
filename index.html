<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Race Start Timer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000; color: #fff;
    font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; user-select: none;
  }
  #clock { font-size: 20px; letter-spacing: 2px; color: #555; margin-bottom: 16px; }
  #countdown {
    font-size: clamp(100px, 24vw, 240px);
    font-weight: 900; letter-spacing: -4px; line-height: 1;
    color: #00ff88; text-shadow: 0 0 40px rgba(0,255,136,0.35);
    min-width: 6ch; text-align: center;
  }
  #countdown.yellow { color: #ffdd00; text-shadow: 0 0 40px rgba(255,221,0,0.5); }
  #countdown.red    { color: #ff2200; text-shadow: 0 0 60px rgba(255,34,0,0.6); }
  #countdown.gun    { color: #fff; text-shadow: 0 0 100px #fff; animation: flash 0.2s 3; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.05} }
  #label {
    font-size: 16px; letter-spacing: 8px; text-transform: uppercase;
    color: #444; margin-top: 12px; height: 22px; text-align: center;
  }
  #controls { margin-top: 48px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .btn-row { display: flex; gap: 14px; align-items: center; }
  button {
    background: #111; border: 1px solid #333; color: #aaa;
    font-family: 'Courier New', monospace; font-size: 15px;
    letter-spacing: 2px; padding: 12px 24px; cursor: pointer;
    text-transform: uppercase; transition: border-color 0.15s, color 0.15s;
    min-width: 100px;
  }
  button:hover { border-color: #666; color: #fff; }
  .start-btn { border-color: #00ff88; color: #00ff88; font-size: 18px; padding: 14px 36px; }
  .start-btn:hover { background: #001a0d; }
  .danger { border-color: #ff2200; color: #ff2200; }
  .danger:hover { background: #1a0000; }
  #mute-btn { font-size: 22px; padding: 10px 16px; min-width: unset; }
  #status { font-size: 12px; color: #555; letter-spacing: 2px; height: 16px; margin-top: 4px; }
</style>
</head>
<body>

<div id="clock">--:--:--</div>
<div id="countdown">--:--</div>
<div id="label">&nbsp;</div>

<div id="controls">
  <div class="btn-row">
    <button class="start-btn" onclick="start(30)">30 MIN</button>
    <button class="start-btn" onclick="start(10)">10 MIN</button>
    <button class="start-btn" onclick="start(5)">5 MIN</button>
  </div>
  <div class="btn-row">
    <button id="mute-btn" onclick="toggleMute()">&#128266;</button>
    <button class="danger" onclick="doReset()">RESET</button>
  </div>
  <div id="status">TAP A BUTTON TO BEGIN</div>
</div>

// ── Audio via Web Audio API (AudioContext) ──────────────────────────────────
// More reliable than new Audio() for programmatic playback from data URIs.

let actx = null;
const audioBuffers = {};
let buffersReady = false;
let muted = false;

// Convert base64 data URI to ArrayBuffer
function dataURItoArrayBuffer(dataURI) {
  const b64 = dataURI.split(',')[1];
  const binary = atob(b64);
  const buf = new ArrayBuffer(binary.length);
  const view = new Uint8Array(buf);
  for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
  return buf;
}

// Called on first user interaction to unlock AudioContext
async function initAudio() {
  if (actx) return; // already done
  actx = new (window.AudioContext || window.webkitAudioContext)();
  setStatus('LOADING AUDIO...');
  let loaded = 0;
  const keys = Object.keys(AUDIO);
  for (const key of keys) {
    try {
      const arrayBuf = dataURItoArrayBuffer(AUDIO[key]);
      audioBuffers[key] = await actx.decodeAudioData(arrayBuf);
      loaded++;
    } catch(e) {
      setStatus('ERR: ' + key + ' ' + e.message);
    }
  }
  buffersReady = true;
  setStatus('AUDIO READY (' + loaded + '/' + keys.length + ')');
  setTimeout(() => setStatus(''), 2000);
}

function play(key) {
  if (muted || !actx || !buffersReady || !audioBuffers[key]) return;
  const src = actx.createBufferSource();
  src.buffer = audioBuffers[key];
  src.connect(actx.destination);
  src.start(0);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? String.fromCodePoint(128263) : String.fromCodePoint(128266);
}

// ── Clock ───────────────────────────────────────────────────────────────────
function tickClock() {
  const n = new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0') + ':' +
    String(n.getMinutes()).padStart(2,'0') + ':' +
    String(n.getSeconds()).padStart(2,'0');
}
setInterval(tickClock, 500);
tickClock();

// ── Cue map ─────────────────────────────────────────────────────────────────
const CUES = {
  600: 'ten_minutes',
  300: 'five_minutes',
  180: 'three_minutes',
   60: 'one_minute',
   30: 'thirty_seconds',
   20: 'twenty_seconds',
   10: 'ten_seconds',
    9: 'nine',
    8: 'eight',
    7: 'seven',
    6: 'six',
    5: 'five',
    4: 'four',
    3: 'three',
    2: 'two',
    1: 'one'
};

// ── Countdown ────────────────────────────────────────────────────────────────
let secondsLeft = 0;
let intervalId = null;

async function start(minutes) {
  await initAudio(); // unlock + load on first real user tap

  clearInterval(intervalId);
  secondsLeft = minutes * 60;
  updateDisplay();

  // Play opening cue if one exists for this duration
  if (CUES[secondsLeft]) play(CUES[secondsLeft]);

  intervalId = setInterval(() => {
    secondsLeft--;

    if (secondsLeft <= 0) {
      secondsLeft = 0;
      clearInterval(intervalId);
      intervalId = null;
      const el = document.getElementById('countdown');
      el.className = 'gun';
      el.textContent = '0:00';
      document.getElementById('label').textContent = 'START';
      play('one');
      setTimeout(() => { el.className = ''; }, 2500);
      return;
    }

    updateDisplay();
    if (CUES[secondsLeft]) play(CUES[secondsLeft]);

  }, 1000);
}

function updateDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const el = document.getElementById('countdown');
  el.textContent = m + ':' + String(s).padStart(2,'0');
  el.className = secondsLeft > 60 ? '' : secondsLeft > 10 ? 'yellow' : 'red';
  document.getElementById('label').textContent =
    secondsLeft > 60 ? m + ' MIN' : secondsLeft + ' SEC';
}

function doReset() {
  clearInterval(intervalId);
  intervalId = null;
  secondsLeft = 0;
  const el = document.getElementById('countdown');
  el.textContent = '--:--';
  el.className = '';
  document.getElementById('label').textContent = String.fromCodePoint(160);
  setStatus('TAP A BUTTON TO BEGIN');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}
</script>
